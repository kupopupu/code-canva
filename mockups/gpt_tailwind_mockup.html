<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Quản Lý Cho Vay</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    font-family:'Inter',sans-serif;
}

body{
    background:#f8fafc;
    padding-bottom:90px;
}

.card{
    background:white;
    border-radius:24px;
    box-shadow:0 4px 20px rgba(0,0,0,.06);
}

.fab{
    position:fixed;
    right:20px;
    bottom:90px;
    width:60px;
    height:60px;
    border-radius:50%;
    background:#2563eb;
    color:white;
    font-size:32px;
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 10px 25px rgba(37,99,235,.3);
}
</style>
</head>

<body>

<div class="max-w-md mx-auto p-4">

    <div class="mb-5">
        <h1 class="text-2xl font-bold">
            Quản Lý Cho Vay
        </h1>

        <p class="text-slate-500">
            Hôm nay
        </p>
    </div>

    <!-- Dashboard -->

    <div class="card p-5 mb-4">
        <p class="text-slate-500 text-sm">
            Tổng đang cho vay
        </p>

        <h2 class="text-3xl font-bold text-blue-600 mt-2">
            850.000.000đ
        </h2>
    </div>

    <div class="grid grid-cols-2 gap-3 mb-4">

        <div class="card p-4">
            <p class="text-xs text-slate-500">
                Còn nợ
            </p>

            <h3 class="font-bold text-lg">
                620tr
            </h3>
        </div>

        <div class="card p-4">
            <p class="text-xs text-slate-500">
                Tiền quỹ
            </p>

            <h3 class="font-bold text-lg">
                150tr
            </h3>
        </div>

    </div>

    <div class="card p-4 mb-4">
        <p class="text-slate-500 text-sm">
            Nợ nguồn vốn
        </p>

        <h3 class="font-bold text-red-500 text-xl">
            95.000.000đ
        </h3>
    </div>

    <h3 class="font-semibold mb-3">
        Khoản vay đang hoạt động
    </h3>

    <div class="space-y-3">

        <div class="card p-4">

            <div class="flex justify-between">

                <div>
                    <h4 class="font-semibold">
                        Nguyễn Văn A
                    </h4>

                    <p class="text-xs text-slate-500">
                        LOAN-0001
                    </p>
                </div>

                <div class="text-right">
                    <p class="text-xs text-slate-500">
                        Còn nợ
                    </p>

                    <p class="font-bold text-red-500">
                        8.200.000đ
                    </p>
                </div>

            </div>

            <div class="w-full bg-slate-200 h-2 rounded-full mt-4">
                <div
                    class="bg-blue-600 h-2 rounded-full"
                    style="width:75%">
                </div>
            </div>

            <div class="flex justify-between text-xs text-slate-500 mt-2">
                <span>75% hoàn thành</span>
                <span>Đã góp 24 ngày</span>
            </div>

        </div>

    </div>

</div>

<button class="fab">
+
</button>

<!-- Bottom Navigation -->

<div class="fixed bottom-0 left-0 right-0 bg-white border-t">

    <div class="grid grid-cols-4 max-w-md mx-auto">

        <button class="py-3 text-blue-600 font-semibold">
            Dashboard
        </button>

        <button class="py-3 text-slate-500">
            Khoản vay
        </button>

        <button class="py-3 text-slate-500">
            Nguồn vốn
        </button>

        <button class="py-3 text-slate-500">
            Thống kê
        </button>

    </div>

</div>

</body>
</html>
